<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#1a1a2e"/>
  <!-- Balance scale icon -->
  <line x1="50" y1="20" x2="50" y2="50" stroke="#4a90a4" stroke-width="3"/>
  <line x1="20" y1="50" x2="80" y2="50" stroke="#e8e6e3" stroke-width="3"/>
  <circle cx="50" cy="50" r="5" fill="#4a90a4"/>
  <!-- Left pan -->
  <line x1="20" y1="50" x2="20" y2="65" stroke="#e8e6e3" stroke-width="2"/>
  <path d="M10 65 Q20 75 30 65" stroke="#e8e6e3" stroke-width="2" fill="none"/>
  <!-- Right pan -->
  <line x1="80" y1="50" x2="80" y2="65" stroke="#e8e6e3" stroke-width="2"/>
  <path d="M70 65 Q80 75 90 65" stroke="#e8e6e3" stroke-width="2" fill="none"/>
  <!-- Equals sign -->
  <line x1="40" y1="82" x2="60" y2="82" stroke="#4a90a4" stroke-width="2"/>
  <line x1="40" y1="88" x2="60" y2="88" stroke="#4a90a4" stroke-width="2"/>
</svg>
